<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>晶振进化卡 · Crystal Evo Card · 晶宝股份</title>
<style>
  :root {
    --bg: #080d1a;
    --card-bg: #0d1528;
    --gold: #d4a853;
    --gold-light: #f0d68a;
    --blue: #2a6df4;
    --blue-glow: #4d8cff;
    --green: #4ade80;
    --purple: #c084fc;
    --text: #e8ecf3;
    --text-dim: #8899b4;
    --text-dim2: #5a6d8a;
    --border: rgba(212,168,83,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(42,109,244,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(212,168,83,0.06) 0%, transparent 50%);
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    padding: 24px 16px 40px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ── Header ── */
  .header {
    text-align: center; margin-bottom: 28px;
  }
  .brand-logo {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; color: var(--text-dim);
    letter-spacing: 2px; margin-bottom: 6px;
  }
  .brand-logo .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }
  .header h1 {
    font-size: 26px; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold) 40%, var(--blue-glow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .sub {
    font-size: 12px; color: var(--text-dim); margin-top: 4px;
  }

  /* ── Form ── */
  .form-card {
    width: 100%; background: var(--card-bg);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 24px 20px; margin-bottom: 24px;
  }
  .form-card label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text-dim); margin-bottom: 6px;
  }
  .form-card label .en {
    font-size: 10px; font-weight: 400; color: var(--text-dim2);
    margin-left: 6px;
  }
  .form-card input {
    width: 100%; padding: 12px 16px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04); color: var(--text);
    font-size: 16px; font-family: inherit; outline: none;
    transition: border-color 0.2s;
  }
  .form-card input:focus { border-color: var(--blue); }
  .form-card input::placeholder { color: rgba(255,255,255,0.2); }

  .btn-generate {
    width: 100%; margin-top: 16px; padding: 14px;
    border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--blue), #1a54cc);
    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s; letter-spacing: 0.5px;
  }
  .btn-generate:active { transform: scale(0.97); opacity: 0.9; }

  /* ── Card ── */
  .card-wrapper {
    width: 100%; perspective: 1000px; display: none;
  }
  .card-wrapper.visible { display: block; }

  .evo-card {
    width: 100%;
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 20px 18px 14px;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
    transform: rotateY(8deg) rotateX(3deg);
    animation: cardReveal 0.8s cubic-bezier(0.23,1,0.32,1) forwards;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5),
                0 0 40px rgba(42,109,244,0.08),
                inset 0 1px 0 rgba(255,255,255,0.04);
  }
  @keyframes cardReveal {
    0% { transform: rotateY(15deg) rotateX(8deg) translateY(40px); opacity: 0; }
    60% { transform: rotateY(0deg) rotateX(0deg) translateY(-4px); opacity: 1; }
    100% { transform: rotateY(0deg) rotateX(0deg) translateY(0); opacity: 1; }
  }

  .card-shine {
    position: absolute;
    top: -30%; left: -20%; width: 140%; height: 70%;
    background: radial-gradient(ellipse at 30% 50%, rgba(42,109,244,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .card-holo {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(212,168,83,0.03) 30%, rgba(42,109,244,0.04) 50%, transparent 100%);
    pointer-events: none;
  }
  .card-grid {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  .card-top { position: relative; z-index: 1; text-align: center; }
  .rarity-badge {
    display: inline-block; padding: 3px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    border: 1px solid;
  }
  .rarity-ssr { color: #f0d68a; border-color: rgba(240,214,138,0.4); background: rgba(240,214,138,0.08); }
  .rarity-sr { color: #c084fc; border-color: rgba(192,132,252,0.4); background: rgba(192,132,252,0.08); }
  .rarity-r { color: #60a5fa; border-color: rgba(96,165,250,0.4); background: rgba(96,165,250,0.08); }

  .card-icon {
    font-size: 44px; margin: 8px 0 2px; line-height: 1;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .card-type {
    font-size: 19px; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(135deg, #fff, var(--gold-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .card-type-en {
    font-size: 9px; color: var(--text-dim); letter-spacing: 1.5px;
    margin-top: 1px; text-transform: uppercase;
  }

  /* ── Stat Bars ── */
  .card-stats {
    position: relative; z-index: 1;
    margin-top: 10px; padding: 8px 10px;
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .stats-title {
    font-size: 9px; color: var(--gold); letter-spacing: 2px;
    margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
    text-transform: uppercase;
  }
  .stats-title::before {
    content: ''; display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 5px var(--gold);
  }
  .stats-title .en {
    font-size: 7px; color: var(--text-dim2);
    letter-spacing: 1px; font-weight: 400;
  }
  .stat-row {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 3px;
  }
  .stat-row:last-child { margin-bottom: 0; }
  .stat-label {
    width: 44px; flex-shrink: 0;
    font-size: 9px; color: var(--text-dim);
    text-align: right; line-height: 1.1;
  }
  .stat-label .cn { display: block; }
  .stat-label .en {
    font-size: 6.5px; color: var(--text-dim2);
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .stat-bar-wrap {
    flex: 1; height: 12px; background: rgba(255,255,255,0.04);
    border-radius: 6px; overflow: hidden; position: relative;
  }
  .stat-bar-fill {
    height: 100%; border-radius: 6px;
    transition: width 0.8s cubic-bezier(0.23,1,0.32,1);
    position: relative;
  }
  .stat-bar-fill::after {
    content: '';
    position: absolute; top: 2px; left: 4px; right: 8px; height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
  }
  .stat-score {
    width: 22px; flex-shrink: 0;
    font-size: 10px; font-weight: 800; color: var(--text);
    text-align: right; font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .stat-bar-ssr { background: linear-gradient(90deg, #d4a853, #f0d68a); }
  .stat-bar-sr  { background: linear-gradient(90deg, #a78bfa, #c084fc); }
  .stat-bar-r   { background: linear-gradient(90deg, #60a5fa, #93c5fd); }

  /* ── Specs ── */
  .card-body { position: relative; z-index: 1; padding-top: 8px; }
  .spec-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .spec-label-wrap { display: flex; flex-direction: column; }
  .spec-label {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .spec-label-en {
    font-size: 7px; color: var(--text-dim2);
    letter-spacing: 0.3px; text-transform: uppercase;
  }
  .spec-value { font-size: 12px; font-weight: 700; color: var(--text); text-align: right; }

  /* ── Personality ── */
  .card-personality {
    position: relative; z-index: 1;
    margin-top: 8px; padding: 10px 12px;
    background: rgba(255,255,255,0.025);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .personality-label {
    font-size: 9px; color: var(--gold);
    letter-spacing: 2px; margin-bottom: 4px;
    display: flex; align-items: center; gap: 4px;
  }
  .personality-label::before {
    content: ''; display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 5px var(--gold);
  }
  .personality-label .en {
    font-size: 7px; color: var(--text-dim2);
    letter-spacing: 1px; font-weight: 400;
  }
  .personality-text {
    font-size: 12px; line-height: 1.6; color: #c8d2e0;
    font-style: italic; letter-spacing: 0.3px;
  }
  .personality-text-en {
    font-size: 9px; line-height: 1.5; color: var(--text-dim);
    font-style: italic; letter-spacing: 0.2px;
    margin-top: 4px; padding-top: 4px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }

  /* ── Footer ── */
  .card-footer {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px; margin-top: auto;
  }
  .card-footer-left { flex: 1; min-width: 0; }
  .card-footer .name {
    font-size: 17px; font-weight: 800; letter-spacing: 1px;
    color: var(--gold-light);
  }
  .card-footer .event {
    font-size: 8px; color: var(--text-dim); margin-top: 1px;
    letter-spacing: 0.5px;
  }

  .card-qr {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; flex-shrink: 0;
  }
  .card-qr canvas, .card-qr img {
    width: 48px; height: 48px;
    border-radius: 6px;
    background: #fff;
    padding: 3px;
  }
  .qr-label {
    font-size: 7px; color: var(--text-dim);
    letter-spacing: 0.5px; text-align: center;
    line-height: 1.2;
  }

  .card-no {
    position: absolute; right: 18px; bottom: 14px;
    font-size: 9px; color: rgba(255,255,255,0.12);
    letter-spacing: 2px; z-index: 1;
  }

  /* ── Actions ── */
  .actions {
    width: 100%; display: none; gap: 12px; margin-top: 20px;
  }
  .actions.visible { display: flex; }
  .btn-action {
    flex: 1; padding: 12px; border-radius: 12px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; text-align: center;
    transition: all 0.15s; border: 1px solid;
  }
  .btn-save {
    background: var(--blue); border-color: var(--blue);
    color: #fff;
  }
  .btn-save:active { opacity: 0.85; }
  .btn-retry {
    background: transparent; border-color: rgba(255,255,255,0.15);
    color: var(--text-dim);
  }
  .btn-retry:active { background: rgba(255,255,255,0.04); }

  .tip {
    margin-top: 12px; font-size: 11px; color: var(--text-dim);
    text-align: center; display: none;
  }
  .tip.visible { display: block; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 24px;
    font-size: 14px; color: var(--gold-light);
    z-index: 999; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ── Page Footer ── */
  .page-footer {
    margin-top: 32px; font-size: 10px; color: rgba(255,255,255,0.1);
    letter-spacing: 2px; text-align: center;
  }

  @media (max-width: 380px) {
    .evo-card { padding: 16px 12px 12px; }
    .card-icon { font-size: 38px; }
    .card-type { font-size: 17px; }
    .card-qr canvas, .card-qr img { width: 42px; height: 42px; }
    .personality-text { font-size: 11px; }
    .personality-text-en { font-size: 8px; }
    .stat-label { width: 38px; font-size: 8px; }
    .stat-label .en { font-size: 6px; }
    .stat-score { width: 18px; font-size: 9px; }
  }
</style>
</head>

<div class="container">
  <div class="header">
    <div class="brand-logo"><span class="dot"></span> CREC · 晶宝股份</div>
    <h1>晶振进化卡</h1>
    <div class="sub">Electronica China 2026 · 专属限定</div>
  </div>

  <!-- Input -->
  <div class="form-card" id="formCard">
    <label>你的名字 <span class="en">Your Name</span></label>
    <input type="text" id="nameInput" placeholder="输入姓名，生成专属卡片 / Enter your name" maxlength="16">
    <button class="btn-generate" onclick="generate()">✨ 生成我的进化卡 / Generate My Card</button>
  </div>

  <!-- Card -->
  <div class="card-wrapper" id="cardWrapper">
    <div class="evo-card" id="evoCard">
      <div class="card-shine"></div>
      <div class="card-holo"></div>
      <div class="card-grid"></div>

      <div class="card-top">
        <div class="rarity-badge" id="rarityBadge">SSR</div>
        <div class="card-icon" id="cardIcon">💎</div>
        <div class="card-type" id="cardType">TCXO 温补大师</div>
        <div class="card-type-en" id="cardTypeEn">Temperature Compensated Master</div>
      </div>

      <!-- Stat Bars -->
      <div class="card-stats" id="cardStats"></div>

      <!-- Specs -->
      <div class="card-body" id="cardBody"></div>

      <!-- Personality -->
      <div class="card-personality" id="cardPersonality">
        <div class="personality-label">
          ✦ 属性解读 <span class="en">Trait Analysis</span>
        </div>
        <div class="personality-text" id="personalityText"></div>
        <div class="personality-text-en" id="personalityTextEn"></div>
      </div>

      <div class="card-footer">
        <div class="card-footer-left">
          <div class="name" id="cardName">---</div>
          <div class="event">Electronica China 2026 · CREC 晶宝股份</div>
        </div>
        <div class="card-qr">
          <div id="qrContainer"></div>
          <div class="qr-label" id="qrLabel">扫码关注<br>Follow Us</div>
        </div>
      </div>
      <div class="card-no" id="cardNo">NO.001</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions" id="actionsBar">
    <button class="btn-retry" onclick="retry()">🔄 再试一次<br><span style="font-size:9px;font-weight:400;color:var(--text-dim2)">Try Again</span></button>
    <button class="btn-save" onclick="saveCard()">📸 保存卡片<br><span style="font-size:9px;font-weight:400;opacity:0.7">Save Card</span></button>
  </div>
  <div class="tip" id="shareTip">长按图片可保存到相册，分享给朋友 / Long press to save &amp; share</div>

  <div class="page-footer">CREC ELECTRONICS · SINCE 1990</div>
</div>

<div class="toast" id="toast"></div>

// 二维码生成
// ═══════════════════════════════════════════
function renderQRCode() {
  const container = document.getElementById('qrContainer');
  container.innerHTML = '';

  if (QR_CONFIG.useWechatQr && QR_CONFIG.wechatQrImage && QR_CONFIG.wechatQrImage.length > 100) {
    const img = document.createElement('img');
    img.src = QR_CONFIG.wechatQrImage;
    img.alt = '公众号二维码';
    img.crossOrigin = 'anonymous';
    container.appendChild(img);
  } else if (QR_CONFIG.jinshuijuUrl && QR_CONFIG.jinshuijuUrl.indexOf('xxxxxx') === -1) {
    try {
      new QRCode(container, {
        text: QR_CONFIG.jinshuijuUrl,
        width: 48,
        height: 48,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
      });
    } catch(e) {
      console.warn('QR生成失败:', e);
      container.innerHTML = '<div style="width:48px;height:48px;border:1px dashed rgba(255,255,255,0.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,0.2);">QR</div>';
    }
  } else {
    container.innerHTML = '<div style="width:48px;height:48px;border:1px dashed rgba(255,255,255,0.12);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(255,255,255,0.15);text-align:center;line-height:1.3;">QR</div>';
  }
}

renderQRCode();

// ═══════════════════════════════════════════
// 渲染属性评分条
// ═══════════════════════════════════════════
function renderStatBars(type) {
  const container = document.getElementById('cardStats');
  let html = '<div class="stats-title">✦ 属性面板 <span class="en">Attribute Panel</span></div>';

  STAT_DIMS.forEach(dim => {
    const score = type.stats[dim.id];
    let colorClass = type.statBarClass;
    // 根据分数微调颜色
    let barColor;
    if (score >= 90) barColor = 'linear-gradient(90deg, #f0d68a, #fbbf24)';
    else if (score >= 70) barColor = 'linear-gradient(90deg, #2a6df4, #4d8cff)';
    else if (score >= 50) barColor = 'linear-gradient(90deg, #a78bfa, #c084fc)';
    else barColor = 'linear-gradient(90deg, #60a5fa, #93c5fd)';

    html += `
      <div class="stat-row">
        <div class="stat-label">
          <span class="cn">${dim.cn}</span>
          <span class="en">${dim.en}</span>
        </div>
        <div class="stat-bar-wrap">
          <div class="stat-bar-fill" style="width:0%;background:${barColor};" data-width="${score}%"></div>
        </div>
        <div class="stat-score">${score}</div>
      </div>`;
  });

  container.innerHTML = html;

  // 延迟动画：逐条填充
  requestAnimationFrame(() => {
    const bars = container.querySelectorAll('.stat-bar-fill');
    bars.forEach((bar, i) => {
      setTimeout(() => {
        bar.style.width = bar.dataset.width;
      }, i * 80);
    });
  });
}

    document.getElementById('nameInput').focus();
    return;
  }

  const type = CARD_TYPES[Math.floor(Math.random() * CARD_TYPES.length)];

  // Badge
  document.getElementById('rarityBadge').textContent = type.rarity;
  document.getElementById('rarityBadge').className = 'rarity-badge ' + type.rarityClass;

  // Icon + Title
  document.getElementById('cardIcon').textContent = type.icon;
  document.getElementById('cardType').textContent = type.name;
  document.getElementById('cardTypeEn').textContent = type.en;

  // Name
  document.getElementById('cardName').textContent = name;

  // Card number
  const no = 'NO.' + String(Math.floor(Math.random() * 900) + 100).padStart(3,'0');
  document.getElementById('cardNo').textContent = no;

  // Stat bars
  renderStatBars(type);

  // Specs
  let specHtml = '';
  type.specs.forEach(s => {
    specHtml += `<div class="spec-row">
      <div class="spec-label-wrap">
        <span class="spec-label">${s.label}</span>
        <span class="spec-label-en">${s.labelEn}</span>
      </div>
      <span class="spec-value">${s.value}</span>
    </div>`;
  });
  document.getElementById('cardBody').innerHTML = specHtml;

  // Personality
  document.getElementById('personalityText').textContent = type.personality;
  document.getElementById('personalityTextEn').textContent = type.personalityEn;

  // Re-render QR
  renderQRCode();

  // Show card
  const wrapper = document.getElementById('cardWrapper');
  const card = document.getElementById('evoCard');

  wrapper.classList.remove('visible');
  void wrapper.offsetWidth;

  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'cardReveal 0.8s cubic-bezier(0.23,1,0.32,1) forwards';

  wrapper.classList.add('visible');
  document.getElementById('actionsBar').classList.add('visible');
  document.getElementById('formCard').style.display = 'none';

  setTimeout(() => {
    wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function retry() {
  document.getElementById('formCard').style.display = 'block';
  document.getElementById('cardWrapper').classList.remove('visible');
  document.getElementById('actionsBar').classList.remove('visible');
  document.getElementById('shareTip').classList.remove('visible');
  document.getElementById('nameInput').value = '';
  document.getElementById('nameInput').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function saveCard() {
  const card = document.getElementById('evoCard');
  const btn = document.querySelector('.btn-save');

  btn.innerHTML = '⏳ 生成中...<br><span style="font-size:9px;font-weight:400;opacity:0.7">Rendering...</span>';
  btn.style.pointerEvents = 'none';

  const origTransform = card.style.transform;
  const origAnimation = card.style.animation;
  const origBoxShadow = card.style.boxShadow;

  const shine = card.querySelector('.card-shine');
  const holo = card.querySelector('.card-holo');
  if (shine) shine.style.display = 'none';
  if (holo) holo.style.display = 'none';

  card.style.transform = 'none';
  card.style.animation = 'none';
  card.style.boxShadow = 'none';

  // Fix gradient text for html2canvas
  const cardTitle = card.querySelector('.card-type');
  const origTitleFill = cardTitle.style.webkitTextFillColor;
  const origTitleBg = cardTitle.style.background;
  const origTitleBgClip = cardTitle.style.webkitBackgroundClip;
  cardTitle.style.webkitTextFillColor = '#f0d68a';
  cardTitle.style.background = 'none';
  cardTitle.style.webkitBackgroundClip = 'border-box';

  const headerH1 = document.querySelector('.header h1');
  let origH1Fill, origH1Bg, origH1BgClip;
  if (headerH1) {
    origH1Fill = headerH1.style.webkitTextFillColor;
    origH1Bg = headerH1.style.background;
    origH1BgClip = headerH1.style.webkitBackgroundClip;
    headerH1.style.webkitTextFillColor = '#f0d68a';
    headerH1.style.background = 'none';
    headerH1.style.webkitBackgroundClip = 'border-box';
  }

  await new Promise(r => requestAnimationFrame(r));

  try {
    const canvas = await html2canvas(card, {
      scale: 2,
      backgroundColor: '#0d1528',
      useCORS: true,
      allowTaint: true,
      logging: false,
    });

    const link = document.createElement('a');
    link.download = 'CrystalEvoCard_' + document.getElementById('cardName').textContent + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

    document.getElementById('shareTip').classList.add('visible');
  } catch(e) {
    try {
      const canvas2 = await html2canvas(card, { scale: 2, backgroundColor: '#0d1528', allowTaint: true });
      const w = window.open('');
      w.document.write('<img src="' + canvas2.toDataURL() + '" style="width:100%">');
      w.document.title = 'Long press to save';
      showToast('请长按图片保存 / Long press to save');
    } catch(e2) {
      showToast('保存失败，请截图保存 / Save failed, please screenshot');
    }
  }

  // Restore
  card.style.transform = origTransform;
  card.style.animation = origAnimation;
  card.style.boxShadow = origBoxShadow;
  if (shine) shine.style.display = '';
  if (holo) holo.style.display = '';

  cardTitle.style.webkitTextFillColor = origTitleFill;
  cardTitle.style.background = origTitleBg;
  cardTitle.style.webkitBackgroundClip = origTitleBgClip;

  if (headerH1) {
    headerH1.style.webkitTextFillColor = origH1Fill;
    headerH1.style.background = origH1Bg;
    headerH1.style.webkitBackgroundClip = origH1BgClip;
  }

  btn.style.pointerEvents = 'auto';
  btn.innerHTML = '📸 保存卡片<br><span style="font-size:9px;font-weight:400;opacity:0.7">Save Card</span>';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
